name: Production Quality & Security Pipeline

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint-and-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Initialize Python Runtime Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # Stable target matrix for production dependencies
          cache: 'pip'

      - name: Install System Framework Pre-requisites
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy

      - name: ⚡ Run Ruff Linter & Formatter Check
        run: ruff check . && ruff format --check .

      - name: 🔬 Run Mypy Static Type Verification
        run: mypy --ignore-missing-imports app/

      - name: 🛡️ Audit Repository for Leaked Private Secrets
        name: Trufflehog Secret Scan
        uses: trufflesecurity/trufflehog@main
        with:
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

  changelog-generation:
    runs-on: ubuntu-latest
    needs: lint-and-validate
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout Code Matrix
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: 📜 Generate Automated Conventional Changelog via Git-Cliff
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --verbose
        env:
          OUTPUT: CHANGELOG.md